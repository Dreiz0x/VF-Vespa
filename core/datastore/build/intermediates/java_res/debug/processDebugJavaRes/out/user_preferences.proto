syntax = "proto3";
option java_package = "dev.vskelk.cdf.core.datastore";
option java_multiple_files = true;

enum ProviderProto {
    PROVIDER_UNSPECIFIED = 0;
    PROVIDER_ANTHROPIC = 1;
    PROVIDER_GEMINI = 2;
    PROVIDER_OPENAI = 3;
}

message UserPreferences {
    bool offline_mode = 1;
    bool decision_engine_enabled = 2;
    ProviderProto active_provider = 3;
    map<string, string> api_keys = 4;
}
