build:
  maxIssues: 0

config:
  validation: true

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: true

complexity:
  LongMethod:
    threshold: 80
  TooManyFunctions:
    thresholdInFiles: 25

naming:
  FunctionNaming:
    functionPattern: '[a-z][a-zA-Z0-9]*'
    ignoreAnnotated:
      - Composable
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][_A-Z0-9]*'
